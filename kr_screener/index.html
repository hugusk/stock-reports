<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KR Screener — KOSPI · KOSDAQ</title>
<style>
:root {
  --surface-1: #fcfcfb; --page: #f9f9f7;
  --ink-1: #0b0b0b; --ink-2: #52514e; --ink-3: #898781;
  --grid: #e1e0d9; --baseline: #c3c2b7; --border: rgba(11,11,11,0.10);
  --up: #d03b3b; --down: #2a6fd6; --neutral: #f0efec;   /* 한국식: 상승 빨강 / 하락 파랑 */
  --up-text: #c02f2f; --down-text: #2a6fd6;
  --hover-wash: rgba(11,11,11,0.045);
  --accent: #2a78d6;
}
html[data-theme="dark"] {
  --surface-1: #1a1a19; --page: #0d0d0d;
  --ink-1: #ffffff; --ink-2: #c3c2b7; --ink-3: #898781;
  --grid: #2c2c2a; --baseline: #383835; --border: rgba(255,255,255,0.10);
  --up: #e05b5b; --down: #4a8ee8; --neutral: #383835;
  --up-text: #e66767; --down-text: #5f9cf0;
  --hover-wash: rgba(255,255,255,0.06);
  --accent: #3987e5;
}
* { box-sizing: border-box; }
body { margin:0; background:var(--page); color:var(--ink-1);
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size:14px; line-height:1.45; }
.wrap { max-width: 1320px; margin: 0 auto; padding: 18px 20px 60px; }
header.page { display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding: 2px 0 14px; }
header.page h1 { font-size:20px; margin:0; font-weight:650; }
header.page .sub { color:var(--ink-3); font-size:12.5px; }
header.page .spacer { flex:1; }
.btn { border:1px solid var(--border); background:var(--surface-1); color:var(--ink-2);
  border-radius:8px; padding:4px 12px; font-size:13px; cursor:pointer; font-family:inherit; }
.status { font-size:12.5px; color:var(--ink-3); }
.status.busy::before { content:"⟳ "; }

.tabs { display:flex; gap:4px; border-bottom:1px solid var(--grid); margin-bottom:14px; flex-wrap:wrap; }
.tabs button { border:none; background:none; color:var(--ink-3); font-size:14px; font-family:inherit;
  padding:8px 16px; cursor:pointer; border-bottom:2px solid transparent; }
.tabs button.on { color:var(--ink-1); font-weight:650; border-bottom-color:var(--accent); }
.tabs.market button.on { border-bottom-color: var(--ink-1); }
.tabs.market button { font-size:15px; }

.kpis { display:flex; gap:22px; flex-wrap:wrap; margin:0 0 14px; }
.kpi .lab { font-size:12px; color:var(--ink-3); }
.kpi .val { font-size:17px; font-weight:650; }
.kpi .val.up { color:var(--up-text); } .kpi .val.down { color:var(--down-text); }

.card { background:var(--surface-1); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
.view { display:none; } .view.on { display:block; }

/* 히트맵 */
.hm-controls { display:flex; gap:10px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
.hm-controls select { background:var(--surface-1); color:var(--ink-1); border:1px solid var(--border);
  border-radius:8px; padding:5px 10px; font-size:13px; font-family:inherit; }
.hm-legend { display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--ink-3); margin-left:auto; }
.hm-legend .grad { width:140px; height:10px; border-radius:5px; }
#heatmap { position:relative; width:100%; height:760px; }
.hm-sector { position:absolute; border:1px solid var(--page); overflow:hidden; background:var(--surface-1); }
.hm-sector .hm-title { font-size:11px; font-weight:650; color:var(--ink-2); padding:1px 5px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; height:17px; }
.hm-tile { position:absolute; display:flex; flex-direction:column; align-items:center; justify-content:center;
  overflow:hidden; cursor:pointer; border:1px solid var(--page); border-radius:2px; }
.hm-tile:hover { filter:brightness(1.15); z-index:3; }
.hm-tile .tn { font-weight:650; white-space:nowrap; }
.hm-tile .tv { white-space:nowrap; opacity:.9; }

/* 퍼포먼스 바 */
.charts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:14px; }
.chart-title { font-size:13px; font-weight:650; color:var(--ink-2); margin:0 0 10px; letter-spacing:.02em; }
.bar-row { display:grid; grid-template-columns:96px 1fr; align-items:center; gap:8px;
  padding:1px 4px; border-radius:6px; cursor:pointer; }
.bar-row:hover { background:var(--hover-wash); }
.bar-row .name { font-size:12px; color:var(--ink-2); text-align:right;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bar-track { position:relative; height:20px; display:flex; align-items:center; }
.bar-track::before { content:""; position:absolute; left:0; top:0; bottom:0; border-left:1px solid var(--baseline); }
.bar { height:14px; border-radius:0 4px 4px 0; min-width:2px; flex:0 0 auto; }
.bar.up { background:var(--up); } .bar.down { background:var(--down); }
.bar.seq { background: var(--accent); }
.bar-val { font-size:11.5px; margin-left:6px; color:var(--ink-2); font-variant-numeric:tabular-nums; white-space:nowrap; }
.legend { display:inline-flex; gap:14px; font-size:12px; color:var(--ink-2); font-weight:400; }
.legend .key { display:inline-flex; align-items:center; gap:5px; }
.legend .sw { width:12px; height:12px; border-radius:3px; display:inline-block; }
h2.sec { font-size:15px; font-weight:650; margin:4px 0 12px; display:flex; align-items:center; gap:12px; }
.sec-note { color:var(--ink-3); font-size:12.5px; margin:-6px 0 12px; }

/* 스펙트럼 */
.spectrum { border-collapse:separate; border-spacing:3px; width:100%; }
.spectrum th { font-size:12px; color:var(--ink-3); font-weight:600; padding:4px 8px; text-align:center; }
.spectrum th.l { text-align:right; }
.spectrum td { text-align:center; font-size:12px; padding:8px 4px; border-radius:6px;
  font-variant-numeric:tabular-nums; min-width:64px; }
.spectrum td.lab { text-align:right; color:var(--ink-2); background:none; font-size:12.5px; min-width:90px; }

/* 테이블 공통 */
table.data { border-collapse:collapse; width:100%; }
table.data th, table.data td { padding:6px 9px; font-size:12.5px; white-space:nowrap; }
table.data thead th { text-align:right; color:var(--ink-3); font-weight:600; cursor:pointer;
  border-bottom:1px solid var(--grid); user-select:none; position:sticky; top:0; background:var(--surface-1); z-index:2; }
table.data thead th.l, table.data td.l { text-align:left; }
table.data tbody td { border-bottom:1px solid var(--grid); text-align:right;
  font-variant-numeric:tabular-nums; color:var(--ink-1); }
table.data tbody tr:hover { background:var(--hover-wash); }
td.up { color:var(--up-text); } td.down { color:var(--down-text); }
td.dim, th.dim { color:var(--ink-3); }
a.tk { color:inherit; text-decoration:none; font-weight:650; }
a.tk:hover { text-decoration:underline; }

.filters { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
.filters input, .filters select { background:var(--surface-1); color:var(--ink-1);
  border:1px solid var(--border); border-radius:8px; padding:5px 9px; font-size:12.5px; font-family:inherit; }
.filters input[type="text"] { width:150px; }
.filters input[type="number"] { width:82px; }
.filters .count { color:var(--ink-3); font-size:12.5px; margin-left:auto; }
.filters .clear { background:none; border:none; color:var(--ink-3); cursor:pointer; font-size:12.5px; text-decoration:underline; }
.table-scroll { overflow:auto; max-height:70vh; border-radius:8px; }
.pager { display:flex; gap:8px; align-items:center; justify-content:center; margin-top:12px; font-size:13px; color:var(--ink-2); }

.tooltip { position:fixed; pointer-events:none; z-index:50; display:none;
  background:var(--ink-1); color:var(--surface-1); font-size:12px; padding:7px 11px;
  border-radius:8px; box-shadow:0 4px 14px rgba(0,0,0,.3); line-height:1.5; }
.gtable-scroll { overflow-x:auto; }
</style>
</head>
<body>
<div class="wrap">
  <header class="page">
    <h1>KR Screener</h1>
    <span class="sub" id="meta"></span>
    <span class="status" id="status"></span>
    <span class="spacer"></span>
    <button class="btn" id="refreshBtn" style="display:none">🔄 갱신</button>
    <button class="btn" id="themeBtn">◐ 테마</button>
  </header>

  <div class="tabs market" id="marketTabs"></div>
  <div class="kpis" id="kpis"></div>
  <div class="tabs" id="viewTabs"></div>

  <div class="view" id="view-heatmap">
    <div class="card">
      <div class="hm-controls">
        <label style="font-size:13px;color:var(--ink-2)">색상 기준</label>
        <select id="hmTf"></select>
        <span class="hm-legend"><span id="hmLo"></span><span class="grad" id="hmGrad"></span><span id="hmHi"></span></span>
      </div>
      <div id="heatmap"></div>
    </div>
  </div>

  <div class="view" id="view-perf">
    <h2 class="sec">섹터 퍼포먼스 <span style="font-weight:400;font-size:12px;color:var(--ink-3)">(시가총액 가중)</span>
      <span class="legend">
        <span class="key"><span class="sw" style="background:var(--up)"></span>상승</span>
        <span class="key"><span class="sw" style="background:var(--down)"></span>하락</span>
      </span>
    </h2>
    <p class="sec-note">막대를 클릭하면 스크리너가 해당 섹터로 필터링됩니다.</p>
    <div class="charts-grid" id="perfCharts"></div>
  </div>

  <div class="view" id="view-spectrum">
    <h2 class="sec">스펙트럼 <span style="font-weight:400;font-size:12px;color:var(--ink-3)">섹터 × 기간 수익률 매트릭스 (시가총액 가중)</span></h2>
    <div class="card gtable-scroll"><table class="spectrum" id="spectrum"></table></div>
  </div>

  <div class="view" id="view-valuation">
    <h2 class="sec">섹터 밸류에이션 <span style="font-weight:400;font-size:12px;color:var(--ink-3)">(중앙값 기준)</span></h2>
    <div class="card gtable-scroll" style="margin-bottom:14px"><table class="data" id="valTable"></table></div>
    <div class="charts-grid" id="valCharts"></div>
  </div>

  <div class="view" id="view-screener">
    <div class="card">
      <div class="filters">
        <input type="text" id="fSearch" placeholder="종목명·코드 검색">
        <select id="fSector"><option value="">전체 섹터</option></select>
        <select id="fInd"><option value="">전체 업종</option></select>
        <select id="fMcap">
          <option value="0">시총 전체</option>
          <option value="1000">1,000억+</option>
          <option value="5000">5,000억+</option>
          <option value="10000">1조+</option>
          <option value="100000">10조+</option>
        </select>
        <select id="fSign">
          <option value="">등락 전체</option><option value="up">상승</option><option value="down">하락</option>
        </select>
        <select id="fRsi">
          <option value="">RSI 전체</option><option value="ob">과매수 (70+)</option>
          <option value="os">과매도 (30-)</option><option value="mid">중립 (30~70)</option>
        </select>
        <input type="number" id="fPeMax" placeholder="PER 이하">
        <input type="number" id="fPbMax" placeholder="PBR 이하" step="0.1">
        <input type="number" id="fDivMin" placeholder="배당% 이상" step="0.5">
        <button class="clear" id="fClear">초기화</button>
        <span class="count" id="count"></span>
      </div>
      <div class="table-scroll"><table class="data" id="stbl"></table></div>
      <div class="pager" id="pager"></div>
    </div>
  </div>
</div>
<div class="tooltip" id="tip"></div>

  return Math.round(eok).toLocaleString('ko-KR') + '억';
}

/* ── 색 (다이버징: down↔neutral↔up) ── */
function cssVar(n){ return getComputedStyle(root).getPropertyValue(n).trim(); }
function hex2rgb(h){ h = h.replace('#',''); return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)]; }
function mix(c1, c2, t){ return 'rgb(' + c1.map((a,i) => Math.round(a + (c2[i]-a)*t)).join(',') + ')'; }
function divColor(v, scale){
  const neu = hex2rgb(cssVar('--neutral') || '#f0efec');
  if (v == null) return mix(neu, neu, 0);
  const pole = hex2rgb(cssVar(v >= 0 ? '--up' : '--down'));
  const t = Math.min(Math.abs(v) / scale, 1);
  return mix(neu, pole, Math.pow(t, 0.75));
}
function tileInk(v, scale){
  const t = v == null ? 0 : Math.min(Math.abs(v)/scale, 1);
  if (t < 0.25) return cssVar('--ink-1');
  return '#ffffff';
}

/* ── 히트맵 (squarified treemap) ── */
function squarify(items, x, y, w, h){
  const rects = []; let i = 0;
  items = items.filter(it => it.v > 0);
  const total = items.reduce((a,b) => a + b.v, 0);
  if (!total || w <= 0 || h <= 0) return rects;
  const area = w * h;
  items = items.map(it => ({...it, a: it.v / total * area}));
  while (i < items.length){
    const horiz = w >= h;
    const side = horiz ? h : w;
    let best = Infinity, count = 1, rowSum = 0;
    for (let j = i; j < items.length; j++){
      const s = rowSum + items[j].a;
      const thick = s / side;
      let worst = 0;
      for (let k = i; k <= j; k++){
        const len = items[k].a / thick;
        worst = Math.max(worst, thick/len, len/thick);
      }
      if (worst <= best){ best = worst; rowSum = s; count = j - i + 1; }
      else break;
    }
    const thick = rowSum / side;
    let off = 0;
    for (let k = i; k < i + count; k++){
      const len = items[k].a / thick;
      rects.push(horiz
        ? {it: items[k], x: x, y: y + off, w: thick, h: len}
        : {it: items[k], x: x + off, y: y, w: len, h: thick});
      off += len;
    }
    if (horiz){ x += thick; w -= thick; } else { y += thick; h -= thick; }
    i += count;
  }
  return rects;
}

function renderHeatmap(){
  const sel = document.getElementById('hmTf');
  if (!sel.options.length){
    TF.forEach(t => { const o = document.createElement('option'); o.value = t.k; o.textContent = t.l; sel.appendChild(o); });
    sel.value = HM_TF;
    sel.onchange = () => { HM_TF = sel.value; renderHeatmap(); };
  }
  const tf = TF.find(t => t.k === HM_TF);
  const box = document.getElementById('heatmap');
  box.innerHTML = '';
  const W = box.clientWidth, H = box.clientHeight;
  if (!W) return;
  // 범례 그라디언트
  const g = document.getElementById('hmGrad');
  const stops = [-1,-0.5,0,0.5,1].map(t =>
    divColor(t * tf.s, tf.s)).join(',');
  g.style.background = 'linear-gradient(90deg,' + stops + ')';
  document.getElementById('hmLo').textContent = '-' + tf.s + '%';
  document.getElementById('hmHi').textContent = '+' + tf.s + '%';

  const stocks = DATA.markets[MARKET].stocks;
  const bySec = {};
  stocks.forEach(s => { if (s.cap) (bySec[s.sector] = bySec[s.sector] || []).push(s); });
  const sectors = Object.entries(bySec)
    .map(([name, arr]) => ({name, v: arr.reduce((a,b) => a + b.cap, 0), arr}))
    .sort((a,b) => b.v - a.v);

  const secRects = squarify(sectors, 0, 0, W, H);
  secRects.forEach(sr => {
    const div = document.createElement('div');
    div.className = 'hm-sector';
    div.style.cssText = `left:${sr.x}px;top:${sr.y}px;width:${sr.w}px;height:${sr.h}px`;
    const showTitle = sr.h > 34 && sr.w > 56;
    if (showTitle) div.innerHTML = '<div class="hm-title">' + sr.it.name + '</div>';
    const innerY = showTitle ? 17 : 0;
    // 섹터 내 종목: 시총 상위, 최대 50개 + 잔여 병합
    const arr = [...sr.it.arr].sort((a,b) => b.cap - a.cap);
    const top = arr.slice(0, 50);
    const rest = arr.slice(50);
    const items = top.map(s => ({v: s.cap, s}));
    if (rest.length){
      const rcap = rest.reduce((a,b) => a + b.cap, 0);
      const pairs = rest.filter(s => s[HM_TF] != null);
      const wsum = pairs.reduce((a,s) => a + s.cap, 0);
      const wavg = wsum ? pairs.reduce((a,s) => a + s[HM_TF]*s.cap, 0) / wsum : null;
      items.push({v: rcap, s: {name: '+' + rest.length, code: null, cap: rcap, [HM_TF]: wavg, agg: true}});
    }
    const tiles = squarify(items, 0, innerY, sr.w - 2, sr.h - innerY - 2);
    tiles.forEach(tr => {
      const s = tr.it.s, v = s[HM_TF];
      const t = document.createElement('div');
      t.className = 'hm-tile';
      const bg = divColor(v, tf.s);
      t.style.cssText = `left:${tr.x}px;top:${tr.y}px;width:${tr.w}px;height:${tr.h}px;background:${bg};color:${tileInk(v, tf.s)}`;
      const fs = Math.max(9, Math.min(15, Math.sqrt(tr.w * tr.h) / 6));
      if (tr.w > 44 && tr.h > 30)
        t.innerHTML = `<span class="tn" style="font-size:${fs}px">${s.name}</span><span class="tv" style="font-size:${fs*0.85}px">${fmtPct1(v)}</span>`;
      else if (tr.w > 38 && tr.h > 13)
        t.innerHTML = `<span class="tn" style="font-size:9.5px">${s.name}</span>`;
      t.onmousemove = e => showTip(e,
        '<b>' + s.name + '</b>' + (s.code ? ' ' + s.code : '') + '<br>' +
        sr.it.name + ' · 시총 ' + fmtCap(s.cap) + '<br>' + tf.l + ' <b>' + fmtPct(v) + '</b>');
      t.onmouseleave = hideTip;
      if (s.code) t.onclick = () => window.open('https://finance.naver.com/item/main.naver?code=' + s.code, '_blank');
      div.appendChild(t);
    });
    box.appendChild(div);
  });
}

function renderPerf(){
  const wrap = document.getElementById('perfCharts');
  wrap.innerHTML = '';
  const groups = DATA.markets[MARKET].groups.perf;
  TF.forEach(tf => {
    const rows = groups.map(gr => ({name: gr.sector, v: gr[tf.k]}))
      .filter(r => r.v != null).sort((a,b) => b.v - a.v);

    const max = Math.max(...rows.map(r => Math.abs(r.v))) || 1;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<p class="chart-title">' + tf.l.toUpperCase() + ' PERFORMANCE</p>';
    rows.forEach(r => {
      const row = document.createElement('div');
      row.className = 'bar-row';
      const w = Math.max(Math.abs(r.v)/max*100, 1);
      row.innerHTML = '<span class="name">' + r.name + '</span>' +
        '<span class="bar-track"><span class="bar ' + (r.v >= 0 ? 'up' : 'down') +
        '" style="width:' + w.toFixed(1) + '%"></span><span class="bar-val">' + fmtPct(r.v) + '</span></span>';
      row.onmousemove = e => showTip(e, '<b>' + r.name + '</b> · ' + tf.l + '<br>' + fmtPct(r.v));

      row.onclick = () => { VIEW = 'screener'; renderAll();
        document.getElementById('fSector').value = r.name; renderTable(); };
      card.appendChild(row);
    });
    wrap.appendChild(card);
  });
}

/* ── 스크리너 ── */
const COLS = [
  {k:'code', l:'코드', left:true, dim:true, f:(v)=>'<a class="tk" href="https://finance.naver.com/item/main.naver?code='+v+'" target="_blank">'+v+'</a>'},
  {k:'name', l:'종목명', left:true, f:v=>'<b>'+v+'</b>'},
  {k:'sector', l:'섹터', left:true, dim:true, f:v=>v},
  {k:'industry', l:'업종', left:true, dim:true, f:v=>v},
  {k:'cap', l:'시총', f:fmtCap},
  {k:'price', l:'현재가', f:fmtInt},
  {k:'chg', l:'등락', sign:true, f:fmtPct},
  {k:'w1', l:'1주', sign:true, f:fmtPct1},
  {k:'m1', l:'1개월', sign:true, f:fmtPct1},
  {k:'m3', l:'3개월', sign:true, f:fmtPct1},
  {k:'m6', l:'6개월', sign:true, f:fmtPct1},
  {k:'ytd', l:'YTD', sign:true, f:fmtPct1},
  {k:'y1', l:'1년', sign:true, f:fmtPct1},
  {k:'per', l:'PER', f:v=>v==null?'—':v.toFixed(1)},
  {k:'pbr', l:'PBR', f:v=>v==null?'—':v.toFixed(2)},
  {k:'roe', l:'ROE%', f:v=>v==null?'—':v.toFixed(1)},
  {k:'dy', l:'배당%', f:v=>v==null?'—':v.toFixed(2)},
  {k:'frgn', l:'외인%', dim:true, f:v=>v==null?'—':v.toFixed(1)},
  {k:'rsi', l:'RSI', f:v=>v==null?'—':v.toFixed(1)},
  {k:'hi52d', l:'52주고가比', f:fmtPct1},
  {k:'amt', l:'거래대금', dim:true, f:v=>v==null?'—':fmtCap(v)},
];
let sortKey = 'cap', sortDir = -1, page = 1;
const PAGE_SIZE = 100;

function filtered(){
  const st = DATA.markets[MARKET].stocks;
  const q = val('fSearch').trim().toLowerCase();
  const sec = val('fSector'), ind = val('fInd');
  const mcap = +val('fMcap'), sign = val('fSign'), rsiF = val('fRsi');
  const peMax = parseFloat(val('fPeMax')), pbMax = parseFloat(val('fPbMax')), divMin = parseFloat(val('fDivMin'));
  return st.filter(s =>
    (!q || s.name.toLowerCase().includes(q) || s.code.includes(q)) &&
    (!sec || s.sector === sec) && (!ind || s.industry === ind) &&
    (!mcap || (s.cap||0) >= mcap) &&
    (!sign || (sign === 'up' ? s.chg > 0 : s.chg < 0)) &&
    (!rsiF || (s.rsi != null && (rsiF === 'ob' ? s.rsi >= 70 : rsiF === 'os' ? s.rsi <= 30 : (s.rsi > 30 && s.rsi < 70)))) &&
    (isNaN(peMax) || (s.per != null && s.per > 0 && s.per <= peMax)) &&
    (isNaN(pbMax) || (s.pbr != null && s.pbr > 0 && s.pbr <= pbMax)) &&
    (isNaN(divMin) || (s.dy != null && s.dy >= divMin)));
}
function val(id){ return document.getElementById(id).value; }

function renderTable(){
  const rows = filtered().sort((a,b) => {
    const av = a[sortKey], bv = b[sortKey];
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === 'string') return av.localeCompare(bv) * sortDir;
    return (av - bv) * sortDir;
  });
  const total = rows.length;
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (page > pages) page = pages;
  const slice = rows.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  document.getElementById('count').textContent = total + ' / ' + DATA.markets[MARKET].stocks.length + '종목';
  const tbl = document.getElementById('stbl');
  tbl.innerHTML =
    '<thead><tr>' + COLS.map(c => '<th class="' + (c.left?'l':'') + (c.dim?' dim':'') + '" data-k="' + c.k + '">' +
      c.l + (sortKey === c.k ? (sortDir > 0 ? ' ↑' : ' ↓') : '') + '</th>').join('') + '</tr></thead>' +
    '<tbody>' + slice.map(r => '<tr>' + COLS.map(c => {
      const v = r[c.k];
      let cls = c.left ? 'l' : '';
      if (c.dim) cls += ' dim';
      if (c.sign && typeof v === 'number') cls += v > 0 ? ' up' : v < 0 ? ' down' : '';
      return '<td class="' + cls + '">' + c.f(v) + '</td>';
    }).join('') + '</tr>').join('') + '</tbody>';
  tbl.querySelectorAll('thead th').forEach(th => th.onclick = () => {
    const k = th.dataset.k;
    if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = -1; }
    page = 1; renderTable();
  });
  const pager = document.getElementById('pager');
  pager.innerHTML = pages <= 1 ? '' :
    '<button class="btn" id="pgPrev" ' + (page<=1?'disabled':'') + '>← 이전</button>' +
    '<span>' + page + ' / ' + pages + '</span>' +
    '<button class="btn" id="pgNext" ' + (page>=pages?'disabled':'') + '>다음 →</button>';
  if (pages > 1){
    document.getElementById('pgPrev').onclick = () => { page--; renderTable(); };
    document.getElementById('pgNext').onclick = () => { page++; renderTable(); };
  }
}

function initFilters(){
  const st = DATA.markets[MARKET].stocks;
  const secSel = document.getElementById('fSector'), indSel = document.getElementById('fInd');
  const curSec = secSel.value, curInd = indSel.value;
  secSel.innerHTML = '<option value="">전체 섹터</option>';
  [...new Set(st.map(s => s.sector))].sort().forEach(s => {
    const o = document.createElement('option'); o.value = o.textContent = s; secSel.appendChild(o); });
  secSel.value = curSec;
  indSel.innerHTML = '<option value="">전체 업종</option>';
  [...new Set(st.map(s => s.industry))].sort().forEach(s => {
    const o = document.createElement('option'); o.value = o.textContent = s; indSel.appendChild(o); });
  indSel.value = curInd;
}
['fSearch','fSector','fInd','fMcap','fSign','fRsi','fPeMax','fPbMax','fDivMin'].forEach(id =>
  document.getElementById(id).addEventListener('input', () => { page = 1; renderTable(); }));
document.getElementById('fClear').onclick = () => {
  ['fSearch','fPeMax','fPbMax','fDivMin'].forEach(id => document.getElementById(id).value = '');
  ['fSector','fInd','fSign','fRsi'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fMcap').value = '0';
  page = 1; renderTable();
};

/* ── 전체 렌더 ── */
function renderAll(){
  document.getElementById('meta').textContent =
    'KOSPI ' + DATA.markets.KOSPI.stocks.length + ' · KOSDAQ ' + DATA.markets.KOSDAQ.stocks.length +
    '종목 · 기준 ' + DATA.updated;
  renderTabs();
  renderKpis();
  initFilters();
  if (VIEW === 'heatmap') renderHeatmap();
  if (VIEW === 'perf') renderPerf();
  if (VIEW === 'spectrum') renderSpectrum();
  if (VIEW === 'valuation') renderValuation();
  if (VIEW === 'screener') renderTable();
}
let rsz;
addEventListener('resize', () => { clearTimeout(rsz); rsz = setTimeout(() => { if (VIEW==='heatmap') renderHeatmap(); }, 200); });

/* ── 서버 모드: 페이지 열 때 자동 갱신 ── */
const isServed = location.protocol.startsWith('http');
const statusEl = document.getElementById('status');
async function refresh(mode){
  statusEl.textContent = '데이터 갱신 중… (당일 시세 재수집)';
  statusEl.classList.add('busy');
  document.getElementById('refreshBtn').disabled = true;
  try {
    const r = await fetch('/api/refresh?mode=' + mode);
    const j = await r.json();
    if (j && j.markets){ DATA = j; renderAll(); statusEl.textContent = '갱신 완료 (' + DATA.updated + ')'; }
    else if (j && j.skipped){ statusEl.textContent = '최신 상태 (' + (j.updated || DATA.updated) + ')'; }
    else statusEl.textContent = '갱신 실패 — 기존 데이터 표시 중';
  } catch (e){ statusEl.textContent = '갱신 실패 — 기존 데이터 표시 중'; }
  statusEl.classList.remove('busy');
  document.getElementById('refreshBtn').disabled = false;
}
if (isServed){
  const btn = document.getElementById('refreshBtn');
  btn.style.display = '';
  btn.onclick = () => refresh('light');
  refresh('auto');
}

renderAll();
